<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>司法院裁判書閱讀助手 — 設定</title>
  <style>
    :root {
      --fg: #1e293b;
      --muted: #64748b;
      --dim: #94a3b8;
      --border: #e2e8f0;
      --bg: #faf8f5;
      --card: #ffffff;
      --accent: #2e7d43;
      --accent-soft: #e6f4ea;
      --accent-border: #c6e4cf;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      margin: 0;
      padding: 48px 24px;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.55;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 6px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 24px 0 12px;
    }
    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .site-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .site-desc {
      font-size: 12px;
      color: var(--dim);
    }
    .radio-group {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      background: #f1f5f9;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .radio-group label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      user-select: none;
      transition: background 0.15s, color 0.15s;
    }
    .radio-group input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .radio-group label:has(input:checked) {
      background: var(--accent);
      color: #ffffff;
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
    }
    .status {
      margin-top: 18px;
      padding: 10px 14px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      color: #1b5e20;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .status.visible { opacity: 1; transform: translateY(0); }
    .depth-card {
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .depth-card .site-name { margin-bottom: 4px; }
    .depth-card .site-desc { margin-bottom: 14px; }
    .depth-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .depth-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      background: #ffffff;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .depth-option:hover {
      background: #f8fafc;
      border-color: var(--dim);
    }
    .depth-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .depth-option .depth-num {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: #f1f5f9;
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
    }
    .depth-option .depth-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .depth-option:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .depth-option:has(input:checked) .depth-num {
      background: var(--accent);
      color: #ffffff;
    }
    .depth-option:has(input:checked) .depth-text {
      color: var(--fg);
      font-weight: 500;
    }
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--dim);
    }
    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>司法院裁判書閱讀助手</h1>
    <p class="subtitle">設定變更會即時套用到開啟中的分頁。</p>

    <div class="section-title">複製設定</div>

    <div class="site-row">
      <div>
        <div class="site-name">複製時自動附上裁判字號</div>
        <div class="site-desc">於選取文字尾端追加「（XX意旨參照）」</div>
      </div>
      <div class="radio-group">
        <label><input type="radio" name="citation" value="on">開</label>
        <label><input type="radio" name="citation" value="off">關</label>
      </div>
    </div>

    <div class="section-title">耳標位置</div>

    <div class="site-row">
      <div>
        <div class="site-name">法令判解系統</div>
        <div class="site-desc">legal.judicial.gov.tw</div>
      </div>
      <div class="radio-group">
        <label><input type="radio" name="fint" value="left">左側</label>
        <label><input type="radio" name="fint" value="right">右側</label>
      </div>
    </div>

    <div class="site-row">
      <div>
        <div class="site-name">裁判書系統</div>
        <div class="site-desc">judgment.judicial.gov.tw</div>
      </div>
      <div class="radio-group">
        <label><input type="radio" name="fjud" value="left">左側</label>
        <label><input type="radio" name="fjud" value="right">右側</label>
      </div>
    </div>

    <div class="site-row">
      <div>
        <div class="site-name">司法院內網</div>
        <div class="site-desc">legal.law.intraj ・ judgment.law.intraj</div>
      </div>
      <div class="radio-group">
        <label><input type="radio" name="intraj" value="left">左側</label>
        <label><input type="radio" name="intraj" value="right">右側</label>
      </div>
    </div>

    <div class="section-title">展開深度</div>

    <div class="depth-card">
      <div class="site-name">耳標展開到第幾層</div>
      <div class="site-desc">點下方任一列即可選擇。多數判決選 3 即可，需要看更深層的細項時再往下加，或選 1 / 2 取得更精簡的章節導覽。</div>
      <div class="depth-options">
        <label class="depth-option">
          <input type="radio" name="maxDepth" value="1">
          <span class="depth-num">1</span>
          <span class="depth-text">主文、事實、理由　/　壹、貳、參</span>
        </label>
        <label class="depth-option">
          <input type="radio" name="maxDepth" value="2">
          <span class="depth-num">2</span>
          <span class="depth-text">再加上　一、二、三</span>
        </label>
        <label class="depth-option">
          <input type="radio" name="maxDepth" value="3">
          <span class="depth-num">3</span>
          <span class="depth-text">再加上　(一)、(二)　/　㈠、㈡</span>
        </label>
        <label class="depth-option">
          <input type="radio" name="maxDepth" value="4">
          <span class="depth-num">4</span>
          <span class="depth-text">再加上　1.、2.　/　⒈、⒉　/　１．、２．</span>
        </label>
        <label class="depth-option">
          <input type="radio" name="maxDepth" value="5">
          <span class="depth-num">5</span>
          <span class="depth-text">再加上　(1)、(2)　/　⑴、⑵　/　（１）、（２）</span>
        </label>
        <label class="depth-option">
          <input type="radio" name="maxDepth" value="6">
          <span class="depth-num">6</span>
          <span class="depth-text">再加上　①、②、③</span>
        </label>
      </div>
    </div>

    <div id="status" class="status">已儲存，正在套用…</div>

    <div class="footer">
      司法院裁判書閱讀助手 —
      <a href="https://github.com/han0302-cyber/judicial-outline-extension" target="_blank">GitHub</a>
      ・
      <a href="https://github.com/han0302-cyber/judicial-outline-extension/blob/main/PRIVACY.md" target="_blank">隱私政策</a>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
